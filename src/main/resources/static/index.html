<!--
    index.html - 青栈博客入口
    登录 / 注册页面，访问项目首先进入此页
    登录成功后跳转到 home.html
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青栈博客 — 欢迎</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/auth.css">
    <link rel="stylesheet" href="/css/parallax.css">
</head>
<body>
<!-- 视差山景背景 -->
<div class="parallax-scene">
    <div class="parallax-layer parallax-layer-6"></div>
    <div class="parallax-layer parallax-layer-5"></div>
    <div class="parallax-layer parallax-layer-4"></div>
    <div class="parallax-layer parallax-bike-1"></div>
    <div class="parallax-layer parallax-bike-2"></div>
    <div class="parallax-layer parallax-layer-3"></div>
    <div class="parallax-layer parallax-layer-2"></div>
    <div class="parallax-layer parallax-layer-1"></div>
</div>

<div class="auth-container">
    <!-- ====== 左侧品牌面板 ====== -->
    <div class="auth-left">
        <!-- 点阵地球 -->
        <canvas id="dotMap" class="dot-map"></canvas>
        <div class="auth-brand">
            <div class="auth-logo">🌸</div>
            <h1 class="auth-title">青栈博客</h1>
            <p class="auth-desc">记录思想的光，与世界分享你的故事</p>
            <div class="auth-features">
                <span>📝 优雅写作</span>
                <span>🗂️ 分类管理</span>
                <span>💬 互动评论</span>
            </div>
        </div>
    </div>

    <!-- ====== 右侧表单面板 ====== -->
    <div class="auth-right">
        <!-- 登录表单 -->
        <div id="loginForm" class="auth-form active">
            <div class="form-header">
                <h2>👋 欢迎回来</h2>
                <p>登录你的账号，继续创作之旅</p>
            </div>
            <div class="form-body">
                <label>用户名</label>
                <input id="loginUsername" type="text" placeholder="请输入用户名" autocomplete="username">
                <label>密码</label>
                <div class="password-wrapper">
                    <input id="loginPassword" type="password" placeholder="请输入密码" autocomplete="current-password">
                    <button type="button" class="toggle-pw" id="toggleLoginPw">👁️</button>
                </div>
                <button id="loginBtn" class="auth-submit">
                    <span>登 录</span>
                    <span class="btn-arrow">→</span>
                </button>
            </div>
            <div class="form-footer">
                <p>还没有账号？<a id="switchToRegister" href="javascript:void(0)">立即注册 →</a></p>
            </div>
        </div>

        <!-- 注册表单 -->
        <div id="registerForm" class="auth-form">
            <div class="form-header">
                <h2>🎉 创建账号</h2>
                <p>只需几步，开启你的博客之旅</p>
            </div>
            <div class="form-body">
                <label>用户名</label>
                <input id="regUsername" type="text" placeholder="请输入用户名" autocomplete="username">
                <label>密码</label>
                <div class="password-wrapper">
                    <input id="regPassword" type="password" placeholder="6-32位密码" autocomplete="new-password">
                    <button type="button" class="toggle-pw" id="toggleRegPw">👁️</button>
                </div>
                <label>邮箱</label>
                <input id="regEmail" type="email" placeholder="请输入邮箱（选填）">
                <label>电话</label>
                <input id="regPhone" type="text" placeholder="请输入电话（选填）">
                <button id="registerBtn" class="auth-submit">
                    <span>注 册</span>
                    <span class="btn-arrow">→</span>
                </button>
            </div>
            <div class="form-footer">
                <p>已有账号？<a id="switchToLogin" href="javascript:void(0)">去登录 →</a></p>
            </div>
        </div>
    </div>
</div>

<script src="/js/main.js"></script>
<script src="/js/auth-page.js"></script>
</body>
</html>
