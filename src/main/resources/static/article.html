<!--
    article.html - 文章列表页
    设计：浅蓝色 · 玻璃态 · 现代简约
    路由：/article.html
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章列表 — 青栈博客</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container">
    <header>
        <h1>🌊 青栈博客</h1>
        <a href="/profile.html" id="userAvatarContainer" class="avatar-wrapper" style="display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.5);padding:6px 14px;border-radius:999px;border:1px solid rgba(59,130,246,0.2);text-decoration:none;">
            <span style="color:var(--text-muted);font-size:0.85rem;">👤 加载中...</span>
        </a>
        <nav>
            <a href="/home.html" data-page="home"><span>首页</span></a>
            <a href="/article.html" data-page="article"><span>文章</span></a>
            <a href="/category.html" data-page="category"><span>分类</span></a>
            <a href="/publish.html" data-page="publish"><span>写文章</span></a>
            <a href="/notifications.html" data-page="notifications" id="navNotification"><span>🔔 通知</span></a>
            <a id="navLogout" href="javascript:void(0)"><span>退出</span></a>
        </nav>
    </header>

    <main>
        <div class="page-header">
            <h1>📖 文章列表</h1>
            <p class="page-subtitle">浏览最新文章，搜索感兴趣的内容，按分类筛选阅读。</p>
        </div>

        <!-- 工具栏 -->
        <div class="toolbar">
            <input id="searchInput" type="text" placeholder="🔍 搜索文章标题或内容...">
            <select id="categoryFilter">
                <option value="">全部分类</option>
            </select>
            <button id="searchBtn">搜索</button>
            <button id="publishBtn">✏️ 发布文章</button>
        </div>

        <!-- 文章列表 -->
        <div id="articleList" class="article-list"></div>

        <!-- 分页 -->
        <div class="pagination">
            <button id="prevPage">← 上一页</button>
            <span id="pageInfo"></span>
            <button id="nextPage">下一页 →</button>
        </div>
    </main>

    <footer>© 2026 青栈博客 · 发现更多精彩</footer>
</div>

<script src="/js/main.js"></script>
<script>initUser();</script>
<script src="/js/article.js"></script>
</body>
</html>
