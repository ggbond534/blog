<!--
    category.html - 分类管理页
    设计：浅蓝色 · 玻璃态 · 现代简约
    路由：/category.html
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分类管理 — 青栈博客</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container">
    <header>
        <h1>🌊 青栈博客</h1>
        <a href="/profile.html" id="userAvatarContainer" class="avatar-wrapper" style="display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.5);padding:6px 14px;border-radius:999px;border:1px solid rgba(59,130,246,0.2);text-decoration:none;">
            <span style="color:var(--text-muted);font-size:0.85rem;">👤 加载中...</span>
        </a>
        <nav>
            <a href="/home.html" data-page="home"><span>首页</span></a>
            <a href="/article.html" data-page="article"><span>文章</span></a>
            <a href="/category.html" data-page="category"><span>分类</span></a>
            <a href="/publish.html" data-page="publish"><span>写文章</span></a>
            <a href="/notifications.html" data-page="notifications" id="navNotification"><span>🔔 通知</span></a>
            <a id="navLogout" href="javascript:void(0)"><span>退出</span></a>
        </nav>
    </header>

    <main>
        <div class="page-header">
            <h1>🗂️ 分类管理</h1>
            <p class="page-subtitle">将分类归入「日常」和「其他」两大分组，让博客结构清晰有序。</p>
        </div>

        <!-- 创建分类 -->
        <div class="toolbar category-toolbar">
            <div class="category-form">
                <input id="categoryName" type="text" placeholder="分类名称">
                <input id="categoryDescription" type="text" placeholder="分类描述（可选）">
                <select id="categoryGroupType">
                    <option value="日常">日常</option>
                    <option value="其他">其他</option>
                </select>
                <button id="createCategory">＋ 创建分类</button>
            </div>
        </div>

        <!-- 分类列表 -->
        <div id="categoryList" class="category-list"></div>
    </main>

    <footer>© 2026 青栈博客 · 管理你的内容</footer>
</div>

<script src="/js/main.js"></script>
<script>initUser();</script>
<script src="/js/category.js"></script>
</body>
</html>
