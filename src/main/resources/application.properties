# ============================================================
# application.properties - Spring Boot 应用配置文件
# 个人博客系统核心配置：
#   - 数据源连接（MySQL）
#   - MyBatis 映射文件位置与别名包
#   - 服务器端口
#   - JSON 序列化日期格式
# ============================================================

# ---- 数据源配置 ----
# 可被环境变量覆盖（Railway 自动注入）：SPRING_DATASOURCE_URL / SPRING_DATASOURCE_USERNAME / SPRING_DATASOURCE_PASSWORD
spring.datasource.url=jdbc:mysql://localhost:3306/blog?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- MyBatis 配置 ----
# MyBatis SQL 映射 XML 文件的位置（classpath 下 mybatis/mapper 目录）
mybatis.mapper-locations=classpath:mybatis/mapper/*.xml
# 实体类别名包：在 XML 中可直接使用类名代替全限定类名
mybatis.type-aliases-package=com.blog.entity
# 开启数据库下划线字段到 Java 驼峰属性的自动映射（user_id → userId）
mybatis.configuration.map-underscore-to-camel-case=true

# ---- 服务器配置 ----
# 应用启动端口（默认 8080，此处使用 8081 避免冲突）
# 数据库已初始化，关闭自动执行 schema.sql
spring.sql.init.mode=never

server.port=8081

# ---- Jackson JSON 序列化配置 ----
# 日期格式化：统一使用 yyyy-MM-dd HH:mm:ss 格式
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
# 时区设置为 UTC
spring.jackson.time-zone=UTC

# ---- 文件上传配置 ----
# 单文件最大 5MB
spring.servlet.multipart.max-file-size=5MB
# 整个请求最大 10MB
spring.servlet.multipart.max-request-size=10MB
# 头像上传存储目录（相对于 static 资源目录）
upload.avatar.path=uploads/avatars/
